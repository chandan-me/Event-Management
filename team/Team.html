================================== -->

<div class="member-modal" id="memberModal">

<div class="member-modal-content">

<span class="close-modal">&times;</span>

<img id="modalImg">

<h3 id="modalName"></h3>

<h5 id="modalRole"></h5>

<p><strong>Location:</strong> <span id="modalLocation"></span></p>

<p><strong>Work Mode:</strong> <span id="modalWork"></span></p>

<p><strong>Phone:</strong> <span id="modalPhone"></span></p>

<p id="modalDesc"></p>

<ul id="modalAchievements"></ul>

<div class="modal-social">
<a id="modalLinkedin" target="_blank"><i class="fab fa-linkedin"></i></a>
<a id="modalGithub" target="_blank"><i class="fab fa-github"></i></a>
<a id="modalInstagram" target="_blank"><i class="fab fa-instagram"></i></a>
<a id="modalEmail"><i class="fas fa-envelope"></i></a>

</div>
</div>
