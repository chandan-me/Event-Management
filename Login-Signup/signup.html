<!DOCTYPE html>
<html>
<head>
    <title>Signup</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
<h1>🎉 EventHub</h1>
    <h2>Create Account</h2>

    <form id="signupForm">

        <input
        type="text"
        id="name"
        placeholder="Full Name">

        <input
        type="email"
        id="email"
        placeholder="Email">

        <input
        type="text"
        id="phone"
        placeholder="Phone Number">

        <input
type="password"
id="password"
placeholder="Password">

<button
type="button"
id="toggleSignupPassword">
Show Password
</button>

<p id="strength"></p>

<input
type="password"
id="confirmPassword"
placeholder="Confirm Password">
<p id="matchMessage"></p>
        <button type="submit">
            Signup
        </button>

    </form>

    <p>
        Already have account?
        <a href="login.html">Login</a>
    </p>

</div>

<script src="auth.js"></script>

</body>
</html>
